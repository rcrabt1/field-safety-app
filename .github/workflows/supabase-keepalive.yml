name: Supabase Keep-Alive

# Free-tier Supabase projects auto-pause after ~1 week of no activity.
# This does a trivial read every few days so the demo project never pauses.
on:
  schedule:
    - cron: '0 12 */3 * *'  # every 3 days at 12:00 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping observations table
        run: |
          curl -sf "${SUPABASE_URL}/rest/v1/observations?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o /dev/null -w "HTTP %{http_code}\n"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
